name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest hypothesis
      - name: Run Ruff Linter
        run: ruff check Effy
      - name: Run Mypy Type Checker
        run: mypy Effy

  test-cpython:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest hypothesis
      - name: Run Test Suite
        env:
          PYTHONPATH: .
        run: pytest

  test-pypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up PyPy
        uses: actions/setup-python@v5
        with:
          python-version: "pypy3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest hypothesis
      - name: Run Test Suite
        env:
          PYTHONPATH: .
        run: pytest
