name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  validate:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up PyPy
        uses: actions/setup-python@v5
        with:
          python-version: "pypy3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest hypothesis

      - name: Run Ruff Linter
        run: ruff check Effy

      - name: Run Mypy Type Checker
        run: mypy Effy

      - name: Run CPython Test Suite
        env:
          PYTHONPATH: .
        run: python3.11 -m pytest

      - name: Run PyPy Test Suite
        env:
          PYTHONPATH: .
        run: pypy3 -m pytest

  release:
    name: Automatic Release
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Release & Build Tools
        run: |
          python -m pip install --upgrade pip
          pip install python-semantic-release build

      - name: Configure Git Bot
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run Python Semantic Release (Version & Tag)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          semantic-release version

      - name: Build Package Distributions
        run: python -m build

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          semantic-release publish
